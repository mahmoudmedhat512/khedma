<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spring Boot — Full Course</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Cairo:wght@300;400;600;700;900&family=Inter:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--bg2:#111827;--bg3:#1a2235;--surface:#1e2d42;--surface2:#243450;--border:#2a3f5f;--accent:#00d4ff;--accent2:#00ff9d;--accent3:#ff6b35;--accent4:#a78bfa;--text:#e2e8f0;--text2:#94a3b8;--text3:#64748b;--green:#10b981;--red:#ef4444;--yellow:#f59e0b;--code-bg:#0d1117;--code-border:#1e3a5f;--radius:12px;--font:'Cairo',sans-serif;--mono:'IBM Plex Mono',monospace}
html[dir="ltr"]{--font:'Inter',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}html{scroll-behavior:smooth}body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

.sidebar{position:fixed;top:0;right:0;width:260px;height:100vh;background:var(--bg2);border-left:1px solid var(--border);overflow-y:auto;z-index:100;padding:20px 0;display:flex;flex-direction:column}
html[dir="ltr"] .sidebar{right:auto;left:0;border-left:none;border-right:1px solid var(--border)}

.sidebar-logo{padding:0 20px 15px;border-bottom:1px solid var(--border);margin-bottom:12px}.sidebar-logo h1{font-size:18px;font-weight:900;color:var(--accent);letter-spacing:-0.5px}.sidebar-logo p{font-size:11px;color:var(--text3);margin-top:2px}

.lang-toggle{display:flex;align-items:center;gap:8px;padding:8px 20px;margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:14px}
.lang-btn{flex:1;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text3);font-size:12px;font-weight:600;cursor:pointer;transition:all .2s;text-align:center;font-family:var(--font)}
.lang-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
.lang-btn:hover:not(.active){border-color:var(--accent);color:var(--text)}

.session-nav-item{padding:10px 20px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .2s;border-right:3px solid transparent;font-size:13px}
html[dir="ltr"] .session-nav-item{border-right:none;border-left:3px solid transparent}
.session-nav-item:hover{background:var(--surface)}.session-nav-item.active{background:var(--surface);border-right-color:var(--accent);color:var(--accent)}
html[dir="ltr"] .session-nav-item.active{border-right-color:transparent;border-left-color:var(--accent)}
.session-nav-item .num{width:24px;height:24px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;font-family:var(--mono)}.session-nav-item.active .num{background:var(--accent);color:var(--bg)}
.session-nav-item.project{color:var(--accent3)}.session-nav-item.project .num{background:rgba(255,107,53,0.15);color:var(--accent3)}.session-nav-item.project.active .num{background:var(--accent3);color:var(--bg)}

.main{margin-right:260px;min-height:100vh}
html[dir="ltr"] .main{margin-right:0;margin-left:260px}
.session-page{display:none;min-height:100vh}.session-page.active{display:block}

.session-hero{padding:40px 48px;background:linear-gradient(135deg,var(--bg2) 0%,var(--bg3) 100%);border-bottom:1px solid var(--border);position:relative;overflow:hidden}.session-hero::before{content:attr(data-session);position:absolute;left:-10px;top:-20px;font-size:160px;font-weight:900;font-family:var(--mono);color:var(--accent);opacity:0.04;line-height:1;pointer-events:none}
html[dir="ltr"] .session-hero::before{left:auto;right:-10px}

.session-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(0,212,255,0.1);color:var(--accent);border:1px solid rgba(0,212,255,0.2);margin-bottom:12px;font-family:var(--mono)}
.session-hero h2{font-size:32px;font-weight:900;line-height:1.2;margin-bottom:8px}.session-hero p{font-size:15px;color:var(--text2);max-width:600px;line-height:1.7}
.session-meta{display:flex;gap:20px;margin-top:20px;flex-wrap:wrap}.meta-tag{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text3);font-family:var(--mono)}.meta-dot{width:6px;height:6px;border-radius:50%}

.content{padding:40px 48px;max-width:900px}.teach-section{margin-bottom:40px}.teach-section>h3{font-size:20px;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}.teach-section>h3 .icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px}

.explain-box{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:24px;margin-bottom:16px;line-height:1.9;font-size:14px;color:var(--text2)}.explain-box strong{color:var(--text);font-weight:600}.explain-box .highlight{background:rgba(0,212,255,0.08);border-right:3px solid var(--accent);padding:12px 16px;border-radius:0 8px 8px 0;margin:12px 0;color:var(--text)}
html[dir="ltr"] .explain-box .highlight{border-right:none;border-left:3px solid var(--accent);border-radius:8px 0 0 8px}
.explain-box .analogy{background:rgba(167,139,250,0.08);border:1px solid rgba(167,139,250,0.2);padding:12px 16px;border-radius:8px;margin:12px 0;color:var(--accent4);font-style:italic}.explain-box .warning{background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.2);padding:12px 16px;border-radius:8px;margin:12px 0;color:var(--yellow)}

.code-block{background:var(--code-bg);border:1px solid var(--code-border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;direction:ltr;text-align:left}.code-header{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:rgba(255,255,255,0.03);border-bottom:1px solid var(--code-border)}.code-lang{font-family:var(--mono);font-size:11px;color:var(--accent);font-weight:600}.code-filename{font-family:var(--mono);font-size:11px;color:var(--text3)}
.copy-btn{font-family:var(--mono);font-size:11px;color:var(--text3);background:none;border:1px solid var(--border);padding:3px 10px;border-radius:5px;cursor:pointer;transition:all .2s}.copy-btn:hover{color:var(--accent);border-color:var(--accent)}
pre{padding:20px;overflow-x:auto;font-family:var(--mono);font-size:13px;line-height:1.8;color:#cdd6f4;direction:ltr;text-align:left}.kw{color:#89b4fa}.str{color:#a6e3a1}.ann{color:#f5c2e7}.cmt{color:#585b70;font-style:italic}.cls{color:#f38ba8}.num{color:#fab387}.fn{color:#89dceb}.type{color:#f9e2af}

.steps{counter-reset:step}.step-item{display:flex;gap:14px;margin-bottom:20px;counter-increment:step}.step-num{width:32px;height:32px;border-radius:50%;flex-shrink:0;background:var(--surface);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:13px;font-weight:700;color:var(--accent);border:1px solid var(--border)}.step-content{flex:1}.step-content h4{font-size:14px;font-weight:700;margin-bottom:6px}.step-content p{font-size:13px;color:var(--text2);line-height:1.7}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}.info-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:16px}.info-card .ic-label{font-size:11px;color:var(--text3);font-family:var(--mono);margin-bottom:6px}.info-card .ic-value{font-size:13px;color:var(--text);line-height:1.6}
.ann-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:12px;display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:start}.ann-badge{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--accent4);background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.2);padding:6px 12px;border-radius:8px;white-space:nowrap}.ann-info h4{font-size:14px;font-weight:700;margin-bottom:4px}.ann-info p{font-size:13px;color:var(--text2);line-height:1.6}
.tree{background:var(--code-bg);border:1px solid var(--code-border);border-radius:var(--radius);padding:20px;font-family:var(--mono);font-size:13px;line-height:2;direction:ltr;text-align:left}.tree .t-folder{color:var(--accent)}.tree .t-file{color:var(--text2)}.tree .t-main{color:var(--accent2);font-weight:600}.tree .t-comment{color:var(--text3)}

.quiz-container{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-top:20px}.quiz-header{padding:20px 24px;background:var(--surface);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}.quiz-header h3{font-size:18px;font-weight:700}.quiz-progress{font-family:var(--mono);font-size:13px;color:var(--accent)}.quiz-body{padding:28px 24px}
.q-text{font-size:16px;font-weight:600;line-height:1.6;margin-bottom:20px}.q-code{background:var(--code-bg);border:1px solid var(--code-border);border-radius:8px;padding:16px;font-family:var(--mono);font-size:12px;line-height:1.7;margin-bottom:20px;color:#cdd6f4;direction:ltr;text-align:left}.options{display:flex;flex-direction:column;gap:10px}
.option{padding:14px 18px;border-radius:10px;border:1px solid var(--border);cursor:pointer;font-size:14px;transition:all .2s;display:flex;gap:12px;align-items:center;background:var(--bg)}.option:hover:not(.disabled){border-color:var(--accent);background:rgba(0,212,255,0.05)}.option.selected{border-color:var(--accent);background:rgba(0,212,255,0.08)}.option.correct{border-color:var(--green);background:rgba(16,185,129,0.1);color:var(--green)}.option.wrong{border-color:var(--red);background:rgba(239,68,68,0.1);color:var(--red)}.option.disabled{cursor:default}
.opt-letter{width:28px;height:28px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:700;background:var(--surface);border:1px solid var(--border)}.option.correct .opt-letter{background:var(--green);color:var(--bg);border-color:var(--green)}.option.wrong .opt-letter{background:var(--red);color:var(--bg);border-color:var(--red)}
.q-feedback{margin-top:16px;padding:16px 20px;border-radius:10px;font-size:13px;line-height:1.8;display:none}.q-feedback.show{display:block}.q-feedback.ok{background:rgba(16,185,129,0.08);border:1px solid rgba(16,185,129,0.2);color:#6ee7b7}.q-feedback.fail{background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:#fca5a5}
.quiz-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}.quiz-score{font-family:var(--mono);font-size:14px}
.btn{padding:10px 24px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;border:none;transition:all .2s;font-family:var(--font)}.btn-primary{background:var(--accent);color:var(--bg)}.btn-primary:hover{opacity:0.85;transform:translateY(-1px)}.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}.btn:disabled{opacity:0.4;cursor:default;transform:none}
.quiz-result{padding:40px 24px;text-align:center;display:none}.result-score{font-size:72px;font-weight:900;font-family:var(--mono);line-height:1}.result-label{font-size:16px;color:var(--text2);margin-top:8px}.result-stars{font-size:32px;margin:16px 0}.result-msg{font-size:14px;color:var(--text2);max-width:400px;margin:0 auto 24px;line-height:1.7}.score-dots{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:20px}.score-dot{width:12px;height:12px;border-radius:50%}.score-dot.c{background:var(--green)}.score-dot.w{background:var(--red)}
.tip-box{background:rgba(0,255,157,0.04);border:1px solid rgba(0,255,157,0.15);border-radius:var(--radius);padding:20px 24px;margin-bottom:16px}.tip-box .tip-label{font-size:11px;color:var(--accent2);font-family:var(--mono);font-weight:600;margin-bottom:8px}.tip-box p{font-size:13px;color:var(--text2);line-height:1.7}
.divider{height:1px;background:var(--border);margin:32px 0}
.data-table{width:100%;border-collapse:collapse;font-size:13px;margin-bottom:16px}.data-table th{background:var(--surface);padding:10px 14px;text-align:right;font-weight:600;border:1px solid var(--border);color:var(--accent);font-family:var(--mono)}.data-table td{padding:10px 14px;border:1px solid var(--border);color:var(--text2)}.data-table tr:hover td{background:rgba(255,255,255,0.02)}
html[dir="ltr"] .data-table th{text-align:left}

.nav-divider{padding:6px 20px;margin-top:8px;font-size:10px;font-weight:700;color:var(--accent3);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;border-top:1px solid var(--border);padding-top:12px}

::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}::-webkit-scrollbar-thumb:hover{background:var(--text3)}
@media(max-width:768px){.sidebar{width:100%;height:auto;position:relative;border-left:none;border-bottom:1px solid var(--border)}.main{margin-right:0!important;margin-left:0!important}.session-hero{padding:24px}.content{padding:24px}.info-grid{grid-template-columns:1fr}.ann-card{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="sidebar">
  <div class="sidebar-logo"><h1>☕ Spring Boot</h1><p id="sidebar-subtitle">10 جلسات | 20 ساعة | Backend كامل</p></div>
  <div class="lang-toggle">
    <button class="lang-btn active" id="btn-ar" onclick="setLang('ar')">🇸🇦 العربية</button>
    <button class="lang-btn" id="btn-en" onclick="setLang('en')">🇬🇧 English</button>
  </div>
  <div id="nav-items"></div>
</div>
<div class="main" id="main-content"></div>
<script src="spring_data.js"></script>
</body>
</html>
